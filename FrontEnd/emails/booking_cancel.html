<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Booking Cancelled</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
  <h2>Booking Cancelled</h2>
  <p>Hello {{ user_name }},</p>

  <p>
    Your booking #{{ booking_id }} for <strong>{{ place_name }}</strong> has been <strong>cancelled</strong>.
  </p>

  <p>
    <strong>Date:</strong> {{ booking_date_display }}
  </p>

  <p>Thanks,<br>Tourist Transport</p>
</body>
</html>
