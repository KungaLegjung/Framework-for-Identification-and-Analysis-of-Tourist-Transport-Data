<!DOCTYPE html>
<html>
<head>
  <title>Admin - Users</title>
</head>
<body>
  <h1>Registered Users</h1>
  <a href="{{ url_for('admin.admin_dashboard') }}">⬅ Back</a>
  <table border="1">
    <tr><th>ID</th><th>Name</th><th>Email</th></tr>
    {% for user in users %}
      <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
      </tr>
    {% endfor %}
  </table>
</body>
</html>
