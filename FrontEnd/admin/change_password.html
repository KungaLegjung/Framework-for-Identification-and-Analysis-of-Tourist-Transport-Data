<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Change Admin Password — Tourist Transport</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    :root {
      --accent: #0f7cdb;
      --bg: #f6f8fb;
      --card: #ffffff;
      --muted: #6b7280;
      --error-bg: #fee2e2;
      --error-color: #b91c1c;
      --success-bg: #dcfce7;
      --success-color: #165f3a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, Segoe UI, Roboto, Arial;
      background: var(--bg);
      color: #071122;
    }

    header {
      background: linear-gradient(90deg, var(--accent), #4aa3ff);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .brand {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    header .logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
    }

    header .brand div {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    header .user-info {
      font-size: 14px;
      opacity: 0.95;
    }

    main.container {
      max-width: 560px;
      margin: 34px auto;
      padding: 22px;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 22px;
      box-shadow: 0 6px 18px rgba(2,6,23,0.06);
    }

    h1 { margin: 0; font-size: 18px; }
    h2 { margin: 0 0 12px 0; color: var(--accent); font-size: 20px; }

    form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 16px;
    }

    label {
      font-size: 14px;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    input[type="password"] {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #e6e9ee;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      border-color: var(--accent);
      outline: none;
    }

    .btn {
      background: var(--accent);
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.2s;
      text-decoration: none; /* remove underline */
      display: inline-block;
      text-align: center;
    }

    .btn:hover { background: #0c63b4; }

    .btn.secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(15,124,219,0.25);
    }

    .btn.secondary:hover {
      background: rgba(15,124,219,0.05);
    }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 6px;
    }

    .message {
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .error {
      background: var(--error-bg);
      color: var(--error-color);
    }

    .success {
      background: var(--success-bg);
      color: var(--success-color);
    }

    .back-link {
      display: inline-block;
      margin-top: 12px;
      font-size: 14px;
      color: var(--accent);
      text-decoration: none; /* remove underline */
    }

    @media(max-width:600px){
      .container{margin:18px;padding:16px}
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">TT</div>
      <div>
        <div style="font-weight:700">Tourist Transport — Admin</div>
        <div style="font-size:13px;opacity:0.95">Account settings</div>
      </div>
    </div>
    <div class="user-info">
      Hello, <strong>{{ session.get('username', 'Admin') }}</strong>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <h2>🔒 Change Admin Password</h2>

      {% if error %}
        <div class="message error">{{ error }}</div>
      {% endif %}
      {% if success %}
        <div class="message success">{{ success }}</div>
      {% endif %}

      <form method="post" novalidate>
        <label>
          Current password
          <input type="password" name="current_password" required>
        </label>

        <label>
          New password
          <input type="password" name="new_password" required>
        </label>

        <label>
          Confirm new password
          <input type="password" name="confirm_password" required>
        </label>

        <div class="actions">
          <a href="{{ url_for('admin.admin_dashboard') }}" class="btn secondary">Cancel</a>
          <button type="submit" class="btn">Update Password</button>
        </div>
      </form>

      <a href="{{ url_for('admin.admin_dashboard') }}" class="back-link">← Back to Dashboard</a>
    </div>
  </main>

  <script>
    // Optional JS: focus first input on page load
    document.addEventListener('DOMContentLoaded', () => {
      const firstInput = document.querySelector('input[name="current_password"]');
      if(firstInput) firstInput.focus();
    });
  </script>
</body>
</html>
