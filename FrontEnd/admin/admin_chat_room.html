  <!doctype html>
  <html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Chat with {{ username }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { --bg:#f6f7fb; --card:#fff; --primary:#2563eb; --muted:#64748b; --bubble:#e5e7eb; }
      * { box-sizing: border-box; }
      body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: var(--bg); }
      .wrap { max-width: 1000px; margin: 0 auto; padding: 16px; }
      .back { text-decoration:none; color: var(--primary); font-weight:600; border:1px solid #d1d5db; padding:8px 12px; border-radius:8px; background:#fff; transition:0.2s; }
      .back:hover { background:#f3f4f6; }
      .card { background: var(--card); border-radius: 14px; box-shadow: 0 6px 18px rgba(0,0,0,.06); overflow: hidden; margin-top: 12px; }
      .card-header { padding: 14px 16px; border-bottom: 1px solid #eef0f3; display:flex; align-items:center; gap:10px; }
      .status-dot { width:10px; height:10px; border-radius:50%; background:#9ca3af; }
      .status-dot.online { background:#10b981; }
      .title { font-weight: 700; font-size: 1.1rem; }
      .room { margin-left:auto; font-size:12px; color: var(--muted); user-select: all; }
      .messages { height: 60vh; overflow-y: auto; padding: 14px; background: #f9fafb; }
      .msg { margin: 10px 0; display:flex; }
      .msg.you { justify-content: flex-end; }
      .bubble { max-width: 72%; padding: 10px 12px; border-radius: 12px; line-height: 1.35; word-wrap: break-word; white-space: pre-wrap; }
      .you .bubble { background: var(--primary); color:#fff; border-bottom-right-radius: 6px; }
      .them .bubble { background: var(--bubble); color:#111827; border-bottom-left-radius: 6px; }
      .meta { font-size: 12px; opacity:.75; margin-top:6px; }
      .composer { display:flex; gap:8px; padding: 12px; border-top:1px solid #eef0f3; background:#fff; }
      .composer input { flex:1; padding: 12px; border:1px solid #d1d5db; border-radius: 10px; font-size: 16px; }
      .composer button { padding: 12px 16px; border:0; background: var(--primary); color:#fff; border-radius:10px; font-weight:600; cursor:pointer; }
      .composer button:disabled { opacity:.6; cursor:not-allowed; }
      .sys { text-align:center; color:#6b7280; font-size:12px; margin: 6px 0; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <a class="back" href="{{ url_for('admin.admin_chat_list') }}">← Back to user list</a>
  
      <div class="card">
        <div class="card-header">
          <div id="statusDot" class="status-dot" aria-hidden="true"></div>
          <div class="title">Chat with {{ username or ('User ' ~ user_id) }}</div>
          <span class="room">Room: {{ room }}</span>
        </div>
  
        <div id="messages" class="messages" aria-live="polite">
          {% for m in messages %}
            {% set mine = (m.sender_type == 'admin') %}
            <div class="msg {{ 'you' if mine else 'them' }}">
              <div class="bubble">
                <div>{{ m.message }}</div>
                <div class="meta">
                  {{ m.sender_name or ('You' if mine else username) }} • 
                  {{ m.timestamp_display or m.timestamp }}
                </div>
              </div>
            </div>
          {% endfor %}
        </div>
  
        <form id="chatForm" class="composer" autocomplete="off">
          <input id="chatInput" type="text" name="message" placeholder="Type a message…" maxlength="1000" />
          <button id="sendBtn" type="submit">Send</button>
        </form>
      </div>
    </div>
  
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
      (function () {
        const room   = {{ room|tojson }};
        const userId = {{ user_id|tojson }};
  
        const messagesEl = document.getElementById('messages');
        const inputEl    = document.getElementById('chatInput');
        const formEl     = document.getElementById('chatForm');
        const sendBtn    = document.getElementById('sendBtn');
        const statusDot  = document.getElementById('statusDot');
  
        const socket = io({ transports: ['websocket', 'polling'], withCredentials: true });
  
        function toLocalDisplay(ts) {
          try {
            if (!ts) return new Date().toLocaleString();
            let s = String(ts);
            if (!/Z$|[+-]\d{2}:\d{2}$/.test(s)) s += 'Z';
            return new Date(s).toLocaleString(undefined, {
              year: 'numeric',
              month: 'short',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              hour12: true
            });
          } catch (_) {
            return new Date().toLocaleString();
          }
        }
  
        function appendMessage({ sender_type, sender_name, message, timestamp }) {
          const mine = sender_type === 'admin';
          const wrap = document.createElement('div');
          wrap.className = 'msg ' + (mine ? 'you' : 'them');
  
          const bubble = document.createElement('div');
          bubble.className = 'bubble';
  
          const body = document.createElement('div');
          body.textContent = message;
  
          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.textContent = (sender_name || (mine ? 'You' : '{{ username }}')) + ' • ' + toLocalDisplay(timestamp);
  
          bubble.appendChild(body);
          bubble.appendChild(meta);
          wrap.appendChild(bubble);
          messagesEl.appendChild(wrap);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
  
        socket.on('connect', () => {
          statusDot.classList.add('online');
          socket.emit('join', { room });
        });
  
        socket.on('disconnect', () => {
          statusDot.classList.remove('online');
        });
  
        socket.on('new_message', (msg) => {
          if (msg && msg.room === room) appendMessage(msg);
        });
  
        formEl.addEventListener('submit', (e) => {
          e.preventDefault();
          const text = (inputEl.value || '').trim();
          if (!text) return;
          sendBtn.disabled = true;
          socket.emit('send_message', { room, message: text });
          inputEl.value = '';
          sendBtn.disabled = false;
          inputEl.focus();
        });
      })();
    </script>
  </body>
  </html>
