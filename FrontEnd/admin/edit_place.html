<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Edit Place — Tourist Transport</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body{font-family:Inter,system-ui,Arial;background:#f6f8fb;margin:0;color:#071122}
    .wrap{max-width:760px;margin:28px auto;padding:18px}
    .card{background:#fff;padding:18px;border-radius:10px;box-shadow:0 6px 18px rgba(2,6,23,0.06)}
    label{display:block;margin-bottom:8px;color:#374151}
    input, textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #e6e9ee;margin-bottom:12px}
    .row{display:flex;gap:8px;justify-content:flex-end}
    .btn{background:#0f7cdb;color:#fff;padding:10px 14px;border-radius:8px;border:none;cursor:pointer}
    .btn.ghost{background:transparent;color:#0f7cdb;border:1px solid rgba(15,124,219,0.12)}
    .btn.danger{background:#ef4444;}
    .error{background:#fee2e2;color:#b91c1c;padding:10px;border-radius:8px;margin-bottom:12px}

    /* Modal Styles */
    .modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;overflow:auto;background:rgba(0,0,0,0.5)}
    .modal-content{background:#fff;margin:15% auto;padding:20px;border-radius:10px;max-width:400px;text-align:center;position:relative}
    .modal-content h3{margin-top:0}
    .modal-buttons{display:flex;justify-content:center;gap:12px;margin-top:16px}
    .modal-buttons .btn{flex:1}
    .modal .close{position:absolute;top:10px;right:12px;font-size:18px;font-weight:bold;color:#555;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2 style="margin-top:0">Edit Place</h2>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <form method="post" action="{{ url_for('admin.edit_place', place_id=place.id) }}">
        <label>Name</label>
        <input type="text" name="name" value="{{ place.name }}" required>

        <label>Location</label>
        <input type="text" name="location" value="{{ place.location }}" required>

        <label>Description</label>
        <textarea name="description" rows="6" required>{{ place.description }}</textarea>

        <div class="row">
          <a href="{{ url_for('admin.admin_dashboard') }}" class="btn ghost" style="text-decoration:none;padding:9px 12px">Cancel</a>
          <button type="submit" class="btn">Save changes</button>
        </div>
      </form>

      <!-- Delete Place Button -->
      <button class="btn danger" id="deletePlaceBtn" style="margin-top:12px;">Delete Place</button>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h3>Delete Place</h3>
      <p>Are you sure you want to delete <strong>{{ place.name }}</strong>? This action cannot be undone.</p>
      <div class="modal-buttons">
        <form method="post" action="{{ url_for('admin.delete_place', place_id=place.id) }}">
          <button type="submit" class="btn danger">Yes, Delete</button>
        </form>
        <button class="btn ghost" id="cancelDelete">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // Modal JS
    const modal = document.getElementById("deleteModal");
    const btn = document.getElementById("deletePlaceBtn");
    const close = document.querySelector(".modal .close");
    const cancelBtn = document.getElementById("cancelDelete");

    btn.onclick = function(){ modal.style.display = "block"; }
    close.onclick = function(){ modal.style.display = "none"; }
    cancelBtn.onclick = function(){ modal.style.display = "none"; }
    window.onclick = function(e){ if(e.target == modal){ modal.style.display = "none"; } }
  </script>
</body>
</html>
